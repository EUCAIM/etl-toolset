apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: {{ include "nifi.name" . }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: {{ include "nifi.name" . }}
    component: postgres
