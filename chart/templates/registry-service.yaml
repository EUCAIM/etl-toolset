apiVersion: v1
kind: Service
metadata:
  name: {{ include "nifi.name" . }}-registry
spec:
  selector:
    app: {{ include "nifi.name" . }}
    component: registry
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.nifiRegistry.service.port }}
      targetPort: 18080

    
