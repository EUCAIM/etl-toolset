apiVersion: v1
kind: Service
metadata:
  name: {{ include "nifi.name" . }}-tdc
spec:
  selector:
    app: {{ include "nifi.name" . }}
    component: tdc
  type: ClusterIP
  ports:
    - name: https
      protocol: TCP
      port: {{ .Values.tdc.service.port }}
      targetPort: {{ .Values.tdc.containerPort }}
